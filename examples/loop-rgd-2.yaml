apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: configmapgroup2
spec:
  schema:
    apiVersion: v1alpha1
    kind: ConfPool2
    spec:
      confs: "[]map[string]string"
  resources:
    - id: configMaps
      forEach:
        - conf: ${schema.spec.confs}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.metadata.name + "-" + conf.name}
          namespace: default
        data:
          data: ${conf.data}
